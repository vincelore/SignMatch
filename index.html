<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SignMatch | Modern Dating for the Deaf Community</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <!-- 1. LANGUAGE SELECTION SCREEN -->
    <section id="language-screen" class="screen active">
        <div class="glass-panel">
            <h1>SignMatch</h1>
            <p>Welcome! Choose your language to continue.</p>
            <div id="lang-options" class="auth-buttons">
                <button class="btn secondary" data-lang="en">English</button>
                <button class="btn secondary" data-lang="nl">Nederlands</button>
            </div>
        </div>
    </section>

    <!-- 2. AUTHENTICATION SCREEN -->
    <section id="auth-screen" class="screen hidden">
        <div class="glass-panel">
            <h2>Welcome Back</h2>
            <div class="auth-buttons">
                <button id="btn-google-login" class="btn primary">Continue with Google</button>
                
                <!-- Email Login Form -->
                <div id="email-form" style="margin-top: 20px;">
                    <input type="email" id="email" placeholder="Email" class="input-field">
                    <input type="password" id="password" placeholder="Password" class="input-field">
                    <button id="btn-email-signup" class="btn secondary" style="width: 100%;">Sign Up</button>
                </div>
            </div>
        </div>
    </section>

    <!-- 3. MAIN APP SCREEN -->
    <section id="app-screen" class="screen hidden">
        <nav class="top-nav">
            <h2>SignMatch</h2>
        </nav>
        <div id="card-stack" class="swipe-container">
            <!-- Swipe cards will be injected here by JS -->
        </div>
    </section>

    <!-- Load Firebase & Your App Logic -->
    <script type="module" src="js/firebase-config.js"></script>
    <script type="module" src="js/app.js"></script>
</body>
</html>
